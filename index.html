<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>夏恩公車</title>
<style>
:root{--bg:#111;--card:#222;--line:#444;--text:#fff;--muted:#cfcfcf;--yellow:#fff064;--green:#58ff7a;--red:#ff6b6b;--gray:#bfc3c7}
*{box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",Arial,sans-serif;margin:0;background:var(--bg);color:var(--text);text-align:center}.wrap{padding:18px 12px 28px;max-width:460px;margin:auto}h1{font-size:32px;margin:10px 0 18px}.card{display:block;text-decoration:none;color:var(--text);background:var(--card);border:1px solid var(--line);border-radius:24px;margin:13px 0;padding:18px 12px}.title{font-size:29px;font-weight:900}.route{font-size:24px;color:var(--yellow);font-weight:900;margin-top:4px}.station{font-size:17px;color:var(--muted);font-weight:700;line-height:1.45;margin-top:8px}.eta{font-size:28px;font-weight:950;margin-top:12px}.green{color:var(--green)}.yellow{color:var(--yellow)}.red{color:var(--red)}.gray{color:var(--gray)}.section{margin:20px 0 8px;font-size:25px;font-weight:950}.row{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:18px;margin:10px 0;padding:14px 16px;text-decoration:none;color:var(--text)}.row .left{text-align:left}.row .name{font-size:20px;font-weight:950}.row .path{font-size:13px;color:var(--muted);font-weight:700;margin-top:3px}.row .eta{margin:0;font-size:22px;min-width:90px;text-align:right}.updated{font-size:13px;color:#aaa;line-height:1.6;margin-top:18px}.small{font-size:12px;color:#888;margin-top:6px}button{font:inherit}
@media(max-width:260px){.wrap{padding:12px 8px}h1{font-size:25px}.title{font-size:24px}.route{font-size:21px}.station{font-size:14px}.eta{font-size:23px}.section{font-size:22px}.row{padding:12px 10px}.row .name{font-size:18px}.row .eta{font-size:20px;min-width:76px}}
</style>
</head>
<body>
<div class="wrap">
<h1>🚌 夏恩公車</h1>

<a class="card" href="https://pda5284.gov.taipei/MQS/route.jsp?rid=17740" data-routeid="17740" data-stop="崁頂三路">
  <div class="title">🏠 夏恩回家</div>
  <div class="route">957</div>
  <div class="station">崁頂三路 → 輕軌濱海義山站</div>
  <div class="eta gray">讀取中...</div>
</a>

<a class="card" href="https://pda5284.gov.taipei/MQS/route.jsp?rid=17740" data-routeid="17740" data-stop="輕軌濱海義山站">
  <div class="title">🏠 夏恩上課</div>
  <div class="route">957</div>
  <div class="station">輕軌濱海義山站 → 崁頂三路</div>
  <div class="eta gray">讀取中...</div>
</a>

<div class="section">🏫 學校上課</div>
<a class="row" href="https://pda5284.gov.taipei/MQS/route.jsp?rid=19088" data-routeid="19088" data-stop="義山路一段">
  <div class="left"><div class="name">紅37</div><div class="path">義山路一段 → 淡海國小</div></div><div class="eta gray">讀取中...</div>
</a>
<a class="row" href="https://pda5284.gov.taipei/MQS/route.jsp?rid=17838" data-routeid="17838" data-stop="濱海義山路口">
  <div class="left"><div class="name">894</div><div class="path">濱海義山路口 → 淡海國小</div></div><div class="eta gray">讀取中...</div>
</a>

<div class="section">🎒 學校下課</div>
<a class="row" href="https://pda5284.gov.taipei/MQS/route.jsp?rid=19088" data-routeid="19088" data-stop="淡海國小">
  <div class="left"><div class="name">紅37</div><div class="path">淡海國小 → 義山路一段</div></div><div class="eta gray">讀取中...</div>
</a>
<a class="row" href="https://pda5284.gov.taipei/MQS/route.jsp?rid=17838" data-routeid="17838" data-stop="淡海國小">
  <div class="left"><div class="name">894</div><div class="path">淡海國小 → 濱海義山路口</div></div><div class="eta gray">讀取中...</div>
</a>
<a class="row" href="https://pda5284.gov.taipei/MQS/route.jsp?rid=17570" data-routeid="17570" data-stop="淡海國小">
  <div class="left"><div class="name">947</div><div class="path">淡海國小 → 大龜崙福德宮</div></div><div class="eta gray">讀取中...</div>
</a>

<div id="updated" class="updated">更新：讀取中...</div>
<div class="small">若即時資料無法讀取，點卡片可開啟大臺北公車詳細頁。</div>
</div>
<script>
const ETA_API='https://pda5284.gov.taipei/MQS/StopDyna?routeid=';
function statusText(v){
  if(v===undefined||v===null||v==='') return ['未發車','gray'];
  const s=Number(v);
  if(Number.isNaN(s)) return [String(v),'gray'];
  if(s===0) return ['進站中','green'];
  if(s===-1) return ['未發車','gray'];
  if(s===-2) return ['交管不停靠','red'];
  if(s===-3) return ['末班已過','red'];
  if(s===-4) return ['今日未營運','red'];
  if(s<0) return ['未發車','gray'];
  if(s<=60) return ['進站中','green'];
  const m=Math.ceil(s/60);
  return [m+' 分鐘',m<=5?'green':m<=10?'yellow':'red'];
}
function normalizeName(x){return String(x||'').replace(/\s/g,'').replace(/臺/g,'台')}
function getStopName(item){return item.nameZh||item.stopname||item.StopName||item.stopName||item.name||item.StopNameZh||''}
function getEta(item){return item.estimatetime??item.estimateTime??item.EstimateTime??item.eta??item.ETA}
async function getRoute(routeid){
  const r=await fetch(ETA_API+routeid+'&_=' + Date.now(),{cache:'no-store'});
  const data=await r.json();
  return Array.isArray(data)?data:(data.BusInfo||data.data||data.result||[]);
}
async function refresh(){
  const cards=[...document.querySelectorAll('[data-routeid]')];
  const routeIds=[...new Set(cards.map(c=>c.dataset.routeid))];
  try{
    const routeData={};
    await Promise.all(routeIds.map(async rid=>{routeData[rid]=await getRoute(rid)}));
    for(const card of cards){
      const routeid=card.dataset.routeid;
      const target=normalizeName(card.dataset.stop);
      const list=routeData[routeid]||[];
      let item=list.find(x=>normalizeName(getStopName(x))===target) || list.find(x=>normalizeName(getStopName(x)).includes(target)||target.includes(normalizeName(getStopName(x))));
      const [txt,cls]=statusText(getEta(item));
      const etaEl=card.querySelector('.eta');
      etaEl.className='eta '+cls;
      etaEl.textContent='🚌 '+txt;
    }
    document.getElementById('updated').textContent='更新：'+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
  }catch(e){
    document.querySelectorAll('.eta').forEach(el=>{el.className='eta gray';el.textContent='未發車';});
    document.getElementById('updated').textContent='即時資料讀取失敗，點卡片可查詳細頁';
  }
}
refresh();
setInterval(refresh,30000);
</script>
</body>
</html>
